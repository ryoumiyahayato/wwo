name: Windows Prototype Release

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: windows-prototype-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-export:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp executable identity
        id: build_info
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $buildCode = (git rev-parse --short=4 HEAD).Trim().ToLowerInvariant()
          $displayVersion = "v0.001a ($buildCode)"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)

          $buildInfoPath = Join-Path $PWD 'scripts\core\build_info.gd'
          $buildInfo = Get-Content -LiteralPath $buildInfoPath -Raw
          $buildInfo = [regex]::Replace(
            $buildInfo,
            'const BUILD_CODE: String = "[^"]+"',
            ('const BUILD_CODE: String = "' + $buildCode + '"')
          )
          [System.IO.File]::WriteAllText($buildInfoPath, $buildInfo, $utf8NoBom)

          "build_code=$buildCode" >> $env:GITHUB_OUTPUT
          "display_version=$displayVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Validating 1900 $displayVersion"

      - name: Install Godot 4.6.3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install godot --version=4.6.3 --yes --no-progress
          if ($LASTEXITCODE -notin @(0, 1641, 3010)) {
            throw "Chocolatey failed to install Godot 4.6.3: exit $LASTEXITCODE"
          }
          $godot = Get-Command godot -ErrorAction Stop
          Write-Host "Godot command: $($godot.Source)"
          godot --version

      - name: Install export templates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $templateUrl = 'https://godot-releases.nbg1.your-objectstorage.com/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz'
          curl.exe --fail --location --retry 5 --retry-delay 3 --output templates.zip $templateUrl
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path templates.zip)) {
            throw 'Godot export templates download failed.'
          }
          $templateArchive = Get-Item -LiteralPath templates.zip
          if ($templateArchive.Length -lt 10MB) {
            throw "Godot export templates archive is unexpectedly small: $($templateArchive.Length) bytes"
          }
          Expand-Archive -LiteralPath templates.zip -DestinationPath templates -Force
          $templateTarget = Join-Path $env:APPDATA 'Godot\export_templates\4.6.3.stable'
          New-Item -ItemType Directory -Force -Path $templateTarget | Out-Null
          $templateRoot = Join-Path $PWD 'templates\templates'
          if (-not (Test-Path -LiteralPath $templateRoot)) {
            $templateRoot = Join-Path $PWD 'templates'
          }
          $templateFiles = Get-ChildItem -LiteralPath $templateRoot -File -Recurse
          if ($templateFiles.Count -eq 0) {
            throw 'Godot export templates archive was empty.'
          }
          Copy-Item -Path (Join-Path $templateRoot '*') -Destination $templateTarget -Recurse -Force

      - name: Import and script scan
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          godot --editor --headless --path . --quit

      - name: Run formal control regression
        shell: pwsh
        run: godot --headless --path . --script res://tests/v2_3/v2_3_controlled_world_test.gd

      - name: Run social sandbox core regression
        shell: pwsh
        run: godot --headless --path . --script res://tests/v2_3/v2_3_social_sandbox_test.gd

      - name: Run social sandbox completion regression
        shell: pwsh
        run: godot --headless --path . --script res://tests/v2_3/v2_3_social_sandbox_completion_test.gd

      - name: Run save round-trip regression
        shell: pwsh
        run: godot --headless --path . --script res://tests/v2_3/v2_3_save_load_test.gd

      - name: Run formal performance guard
        shell: pwsh
        run: godot --headless --path . --script res://tests/v2_3/v2_3_performance_guard_test.gd

      - name: Headless product startup
        shell: pwsh
        run: godot --headless --path . --quit-after 5

      - name: Export embedded Windows executable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path builds\windows | Out-Null
          godot --headless --path . --export-release 'Windows Desktop' builds\windows\wwo-p0-demo.exe
          if ($LASTEXITCODE -ne 0) {
            throw "Godot Windows export failed with exit code $LASTEXITCODE"
          }
          if (-not (Test-Path -LiteralPath builds\windows\wwo-p0-demo.exe)) {
            throw 'Windows export did not create the executable.'
          }
          $export = Get-Item -LiteralPath builds\windows\wwo-p0-demo.exe
          if ($export.Length -lt 1MB) {
            throw "Windows export is unexpectedly small: $($export.Length) bytes"
          }
          Write-Host "Windows export: $($export.FullName) ($($export.Length) bytes)"

      - name: Upload raw Windows export
        uses: actions/upload-artifact@v4
        with:
          name: 1900-Windows-Export
          path: builds/windows/wwo-p0-demo.exe
          if-no-files-found: error
          retention-days: 7

  build-installer:
    needs: validate-and-export
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download validated Windows export
        uses: actions/download-artifact@v4
        with:
          name: 1900-Windows-Export
          path: builds/windows

      - name: Verify downloaded export
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exportPath = Join-Path $PWD 'builds\windows\wwo-p0-demo.exe'
          if (-not (Test-Path -LiteralPath $exportPath -PathType Leaf)) {
            throw "Validated Windows export is missing: $exportPath"
          }
          $export = Get-Item -LiteralPath $exportPath
          if ($export.Length -lt 1MB) {
            throw "Downloaded Windows export is unexpectedly small: $($export.Length) bytes"
          }
          Write-Host "Installer input: $($export.FullName) ($($export.Length) bytes)"

      - name: Stamp installer identity
        id: installer_build_info
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $buildCode = (git rev-parse --short=4 HEAD).Trim().ToLowerInvariant()
          $displayVersion = "v0.001a ($buildCode)"
          $installerPath = Join-Path $PWD 'packaging\windows\1900.iss'
          $installer = Get-Content -LiteralPath $installerPath -Raw
          $installer = [regex]::Replace(
            $installer,
            '#define MyAppVersion "[^"]+"',
            ('#define MyAppVersion "' + $displayVersion + '"')
          )
          [System.IO.File]::WriteAllText(
            $installerPath,
            $installer,
            (New-Object System.Text.UTF8Encoding($false))
          )
          "build_code=$buildCode" >> $env:GITHUB_OUTPUT
          "display_version=$displayVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Compiling installer for 1900 $displayVersion"

      - name: Install Inno Setup 6.7.1
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install innosetup --version=6.7.1 --yes --no-progress --limit-output
          $chocoExit = $LASTEXITCODE
          if ($chocoExit -notin @(0, 1641, 3010)) {
            throw "Chocolatey failed to install Inno Setup 6.7.1: exit $chocoExit"
          }
          $isccCommand = Get-Command iscc -ErrorAction SilentlyContinue
          if ($null -ne $isccCommand) {
            "ISCC_PATH=$($isccCommand.Source)" >> $env:GITHUB_ENV
            Write-Host "Inno Setup shim: $($isccCommand.Source)"
            exit 0
          }
          $searchRoots = @(
            ${env:ProgramFiles(x86)},
            $env:ProgramFiles,
            $env:ChocolateyInstall
          ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) -and (Test-Path $_) }
          $isccCandidate = Get-ChildItem -Path $searchRoots -Filter ISCC.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $isccCandidate) {
            throw 'Inno Setup compiler was not found after installation.'
          }
          "ISCC_PATH=$($isccCandidate.FullName)" >> $env:GITHUB_ENV
          Write-Host "Inno Setup compiler: $($isccCandidate.FullName)"

      - name: Compile installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:ISCC_PATH)) {
            throw 'ISCC_PATH was not resolved.'
          }
          & $env:ISCC_PATH /O+ packaging\windows\1900.iss
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup compilation failed with exit code $LASTEXITCODE"
          }
          $installerPath = Join-Path $PWD 'builds\installer\1900-Prototype-Setup.exe'
          if (-not (Test-Path -LiteralPath $installerPath -PathType Leaf)) {
            throw "Installer compilation did not produce the expected file: $installerPath"
          }
          $installer = Get-Item -LiteralPath $installerPath
          if ($installer.Length -lt 1MB) {
            throw "Installer is unexpectedly small: $($installer.Length) bytes"
          }
          Write-Host "Installer: $($installer.FullName) ($($installer.Length) bytes)"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1900-Prototype-Windows-Installer
          path: builds/installer/1900-Prototype-Setup.exe
          if-no-files-found: error
          retention-days: 30

      - name: Replace prototype-latest prerelease
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          tag: prototype-latest
          name: 1900 Prototype Latest
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifacts: builds/installer/1900-Prototype-Setup.exe
          body: |
            版本：${{ steps.installer_build_info.outputs.display_version }}
            自动覆盖的 Windows 原型安装包。
            安装标识固定；再次安装会覆盖旧版本，不建立新的存档体系。
            对应提交：${{ github.sha }}
