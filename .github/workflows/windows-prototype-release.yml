name: Windows Prototype Release

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: windows-prototype-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp build identity
        id: build_info
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $buildCode = (git rev-parse --short=4 HEAD).Trim().ToLowerInvariant()
          $displayVersion = "v0.001a ($buildCode)"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)

          $buildInfoPath = Join-Path $PWD 'scripts\core\build_info.gd'
          $buildInfo = Get-Content -LiteralPath $buildInfoPath -Raw
          $buildInfo = [regex]::Replace(
            $buildInfo,
            'const BUILD_CODE: String = "[^"]+"',
            ('const BUILD_CODE: String = "' + $buildCode + '"')
          )
          [System.IO.File]::WriteAllText($buildInfoPath, $buildInfo, $utf8NoBom)

          $installerPath = Join-Path $PWD 'packaging\windows\1900.iss'
          $installer = Get-Content -LiteralPath $installerPath -Raw
          $installer = [regex]::Replace(
            $installer,
            '#define MyAppVersion "[^"]+"',
            ('#define MyAppVersion "' + $displayVersion + '"')
          )
          [System.IO.File]::WriteAllText($installerPath, $installer, $utf8NoBom)

          "build_code=$buildCode" >> $env:GITHUB_OUTPUT
          "display_version=$displayVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Building 1900 $displayVersion"

      - name: Download Godot 4.6.3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $headers = @{
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
            'User-Agent' = 'wwo-ci'
          }
          $release = Invoke-RestMethod `
            -Uri 'https://api.github.com/repos/godotengine/godot-builds/releases/tags/4.6.3-stable' `
            -Headers $headers
          $engineAsset = $release.assets | Where-Object {
            $_.name -eq 'Godot_v4.6.3-stable_win64.exe.zip'
          } | Select-Object -First 1
          $templateAsset = $release.assets | Where-Object {
            $_.name -eq 'Godot_v4.6.3-stable_export_templates.tpz'
          } | Select-Object -First 1
          if ($null -eq $engineAsset) {
            throw 'Godot 4.6.3 Windows editor asset was not found in the official release.'
          }
          if ($null -eq $templateAsset) {
            throw 'Godot 4.6.3 export templates asset was not found in the official release.'
          }
          curl.exe --fail --location --retry 5 --retry-delay 3 `
            --output godot.zip $engineAsset.browser_download_url
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path godot.zip)) {
            throw 'Godot editor download failed.'
          }
          Expand-Archive -LiteralPath godot.zip -DestinationPath godot -Force
          $engine = Get-ChildItem -LiteralPath godot -Filter '*.exe' -Recurse | Select-Object -First 1
          if ($null -eq $engine) {
            throw 'Godot executable was not found after extraction.'
          }
          Copy-Item -LiteralPath $engine.FullName -Destination Godot.exe -Force
          curl.exe --fail --location --retry 5 --retry-delay 3 `
            --output templates.zip $templateAsset.browser_download_url
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path templates.zip)) {
            throw 'Godot export templates download failed.'
          }
          Expand-Archive -LiteralPath templates.zip -DestinationPath templates -Force
          $templateTarget = Join-Path $env:APPDATA 'Godot\export_templates\4.6.3.stable'
          New-Item -ItemType Directory -Force -Path $templateTarget | Out-Null
          $templateRoot = Join-Path $PWD 'templates\templates'
          if (-not (Test-Path -LiteralPath $templateRoot)) {
            $templateRoot = Join-Path $PWD 'templates'
          }
          $templateFiles = Get-ChildItem -LiteralPath $templateRoot -File -Recurse
          if ($templateFiles.Count -eq 0) {
            throw 'Godot export templates archive was empty.'
          }
          Copy-Item -Path (Join-Path $templateRoot '*') -Destination $templateTarget -Recurse -Force
          .\Godot.exe --version

      - name: Import and script scan
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\Godot.exe --editor --headless --path . --quit

      - name: Run formal control regression
        shell: pwsh
        run: .\Godot.exe --headless --path . --script res://tests/v2_3/v2_3_controlled_world_test.gd

      - name: Run social sandbox core regression
        shell: pwsh
        run: .\Godot.exe --headless --path . --script res://tests/v2_3/v2_3_social_sandbox_test.gd

      - name: Run social sandbox completion regression
        shell: pwsh
        run: .\Godot.exe --headless --path . --script res://tests/v2_3/v2_3_social_sandbox_completion_test.gd

      - name: Run save round-trip regression
        shell: pwsh
        run: .\Godot.exe --headless --path . --script res://tests/v2_3/v2_3_save_load_test.gd

      - name: Run formal performance guard
        shell: pwsh
        run: .\Godot.exe --headless --path . --script res://tests/v2_3/v2_3_performance_guard_test.gd

      - name: Headless product startup
        shell: pwsh
        run: .\Godot.exe --headless --path . --quit-after 5

      - name: Export embedded Windows executable
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path builds\windows | Out-Null
          .\Godot.exe --headless --path . --export-release 'Windows Desktop' builds\windows\wwo-p0-demo.exe
          if (-not (Test-Path -LiteralPath builds\windows\wwo-p0-demo.exe)) {
            throw 'Windows export did not create the executable.'
          }

      - name: Build installer
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install innosetup --yes --no-progress
          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path -LiteralPath $iscc)) {
            $iscc = Join-Path $env:ProgramFiles 'Inno Setup 6\ISCC.exe'
          }
          if (-not (Test-Path -LiteralPath $iscc)) {
            throw 'Inno Setup compiler was not found.'
          }
          & $iscc packaging\windows\1900.iss
          if (-not (Test-Path -LiteralPath builds\installer\1900-Prototype-Setup.exe)) {
            throw 'Installer compilation did not produce the expected file.'
          }

      - name: Upload installer artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: 1900-Prototype-Windows-Installer
          path: builds/installer/1900-Prototype-Setup.exe
          if-no-files-found: error
          retention-days: 30

      - name: Replace prototype-latest prerelease
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          tag: prototype-latest
          name: 1900 Prototype Latest
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifacts: builds/installer/1900-Prototype-Setup.exe
          body: |
            版本：${{ steps.build_info.outputs.display_version }}
            自动覆盖的 Windows 原型安装包。
            安装标识固定；再次安装会覆盖旧版本，不建立新的存档体系。
            对应提交：${{ github.sha }}
