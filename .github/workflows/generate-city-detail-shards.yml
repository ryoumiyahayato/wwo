name: Generate city detail shards

on:
  push:
    branches:
      - agent/expand-city-map-ui-audit
    paths:
      - tools/world_map/generate_city_shards.py
      - docs/WORLD_CITY_DATA_POLICY.md
      - .github/workflows/generate-city-detail-shards.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-city-detail-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout map branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generator self-test
        run: python tools/world_map/generate_city_shards.py --self-test

      - name: Download official GeoNames inputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p builds/world-map-source
          root='https://download.geonames.org/export/dump'
          curl --fail --location --retry 5 --retry-delay 4 \
            "$root/cities5000.zip" -o builds/world-map-source/cities5000.zip
          curl --fail --location --retry 5 --retry-delay 4 \
            "$root/FR.zip" -o builds/world-map-source/FR.zip
          curl --fail --location --retry 5 --retry-delay 4 \
            "$root/countryInfo.txt" -o builds/world-map-source/countryInfo.txt
          test -s builds/world-map-source/cities5000.zip
          test -s builds/world-map-source/FR.zip
          test -s builds/world-map-source/countryInfo.txt

      - name: Generate country and France municipality shards
        shell: bash
        run: |
          set -euo pipefail
          generated_at="$(date -u +'%Y-%m-%dT%H:%M:%S+00:00')"
          python tools/world_map/generate_city_shards.py \
            --cities-zip builds/world-map-source/cities5000.zip \
            --france-zip builds/world-map-source/FR.zip \
            --country-info builds/world-map-source/countryInfo.txt \
            --countries data/world_map/countries.json \
            --curated-cities data/world_map/cities.json \
            --output data/world_map/city_detail \
            --generated-at "$generated_at"
          python tools/world_map/generate_city_shards.py \
            --validate-output data/world_map/city_detail

      - name: Enforce repository data budget
        shell: bash
        run: |
          set -euo pipefail
          file_count="$(find data/world_map/city_detail -type f | wc -l)"
          byte_count="$(du -sb data/world_map/city_detail | cut -f1)"
          echo "Generated files: $file_count"
          echo "Generated bytes: $byte_count"
          test "$file_count" -le 220
          test "$byte_count" -le 90000000

      - name: Commit generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/world_map/city_detail
          if git diff --cached --quiet; then
            echo 'Generated city detail data is unchanged.'
            exit 0
          fi
          git commit -m 'data: generate Europe Asia North America city shards'
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload generation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: city-detail-generation
          path: |
            data/world_map/city_detail/index.json
            data/world_map/city_detail/LICENSE.json
          if-no-files-found: error
          retention-days: 7
