name: Social Sandbox Diagnostics

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: social-sandbox-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: windows-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.6.3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install godot --version=4.6.3 --yes --no-progress
          if ($LASTEXITCODE -notin @(0, 1641, 3010)) {
            throw "Chocolatey failed to install Godot: exit $LASTEXITCODE"
          }
          godot --version
      - name: Import scripts
        shell: pwsh
        run: godot --editor --headless --path . --quit
      - name: Capture formal social sandbox test output
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path builds\diagnostics | Out-Null
          $stdout = Join-Path $PWD 'builds\diagnostics\formal.stdout.log'
          $stderr = Join-Path $PWD 'builds\diagnostics\formal.stderr.log'
          $combined = Join-Path $PWD 'builds\diagnostics\formal.log'
          $process = Start-Process `
            -FilePath (Get-Command godot).Source `
            -ArgumentList @('--headless', '--path', '.', '--script', 'res://tests/v2_3/v2_3_social_sandbox_test.gd') `
            -WorkingDirectory $PWD `
            -RedirectStandardOutput $stdout `
            -RedirectStandardError $stderr `
            -NoNewWindow `
            -PassThru
          $finished = $process.WaitForExit(180000)
          if (-not $finished) {
            $process.Kill($true)
            Add-Content -LiteralPath $stderr -Value 'DIAGNOSTIC TIMEOUT: formal test exceeded 180 seconds.'
          }
          $parts = @()
          if (Test-Path $stdout) { $parts += Get-Content $stdout }
          if (Test-Path $stderr) { $parts += Get-Content $stderr }
          $parts | Set-Content -LiteralPath $combined -Encoding utf8
          $parts | ForEach-Object { Write-Host $_ }
          if (-not $finished -or $process.ExitCode -ne 0) { exit 1 }
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Social-Sandbox-Diagnostics
          path: builds/diagnostics/*.log
          if-no-files-found: error
          retention-days: 7
