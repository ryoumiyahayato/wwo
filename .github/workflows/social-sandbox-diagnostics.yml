name: Focused Product Diagnostics

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: focused-product-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.6.3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install godot --version=4.6.3 --yes --no-progress
          if ($LASTEXITCODE -notin @(0, 1641, 3010)) {
            throw "Chocolatey failed to install Godot: exit $LASTEXITCODE"
          }
          godot --version
      - name: Import and scan scripts
        shell: pwsh
        run: godot --editor --headless --path . --quit
      - name: Check player interface base
        shell: pwsh
        run: godot --headless --path . --check-only --script res://scripts/v2_3/v2_3_minute_formal_interface_v2.gd
      - name: Run focused tests sequentially
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path builds\diagnostics | Out-Null
          $tests = @(
            @{ Name = 'social-sandbox'; Script = 'res://tests/v2_3/v2_3_social_sandbox_test.gd'; Timeout = 220 },
            @{ Name = 'social-completion'; Script = 'res://tests/v2_3/v2_3_social_sandbox_completion_test.gd'; Timeout = 120 },
            @{ Name = 'survival-autonomy'; Script = 'res://tests/v2_3/v2_3_survival_autonomy_test.gd'; Timeout = 120 },
            @{ Name = 'player-interface'; Script = 'res://tests/v2_3/v2_3_player_interface_test.gd'; Timeout = 120 },
            @{ Name = 'ui-binding'; Script = 'res://tests/v2_3/v2_3_ui_binding_test.gd'; Timeout = 120 },
            @{ Name = 'save-load'; Script = 'res://tests/v2_3/v2_3_save_load_test.gd'; Timeout = 120 },
            @{ Name = 'performance'; Script = 'res://tests/v2_3/v2_3_performance_guard_test.gd'; Timeout = 180 }
          )
          foreach ($test in $tests) {
            Write-Host "`n=== START $($test.Name) ==="
            $stdout = Join-Path $PWD "builds\diagnostics\$($test.Name).stdout.log"
            $stderr = Join-Path $PWD "builds\diagnostics\$($test.Name).stderr.log"
            $combined = Join-Path $PWD "builds\diagnostics\$($test.Name).log"
            $started = Get-Date
            $process = Start-Process `
              -FilePath (Get-Command godot).Source `
              -ArgumentList @('--headless', '--path', '.', '--script', $test.Script) `
              -WorkingDirectory $PWD `
              -RedirectStandardOutput $stdout `
              -RedirectStandardError $stderr `
              -NoNewWindow `
              -PassThru
            $finished = $process.WaitForExit([int]$test.Timeout * 1000)
            if (-not $finished) {
              $process.Kill($true)
              throw "$($test.Name) timed out after $($test.Timeout) seconds"
            }
            $parts = @()
            if (Test-Path $stdout) { $parts += Get-Content $stdout -Encoding UTF8 }
            if (Test-Path $stderr) { $parts += Get-Content $stderr -Encoding UTF8 }
            $parts | Set-Content -LiteralPath $combined -Encoding utf8
            $text = $parts -join "`n"
            if ($process.ExitCode -ne 0) {
              $parts | Select-Object -Last 120 | ForEach-Object { Write-Host $_ }
              throw "$($test.Name) failed with exit code $($process.ExitCode)"
            }
            if ($text -match '(?im)(SCRIPT ERROR|Parse Error|Failed to load script|Assertion failed|[1-9][0-9]* failures)') {
              $parts | Select-Object -Last 120 | ForEach-Object { Write-Host $_ }
              throw "$($test.Name) emitted a script or assertion failure"
            }
            $summary = $parts | Where-Object { $_ -match '(checks, 0 failures|passed|performance:)' } | Select-Object -Last 2
            $elapsed = [math]::Round(((Get-Date) - $started).TotalSeconds, 2)
            $summary | ForEach-Object { Write-Host $_ }
            Write-Host "=== DONE $($test.Name) in $elapsed seconds ==="
          }
          Write-Host "`nALL FOCUSED PRODUCT TESTS COMPLETED"
      - name: Upload focused logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Focused-Product-Diagnostics
          path: builds/diagnostics/*.log
          if-no-files-found: error
          retention-days: 7
