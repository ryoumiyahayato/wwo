name: Social Sandbox Diagnostics

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.6.3
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install godot --version=4.6.3 --yes --no-progress
          if ($LASTEXITCODE -notin @(0, 1641, 3010)) {
            throw "Chocolatey failed to install Godot: exit $LASTEXITCODE"
          }
          godot --version
      - name: Import scripts
        shell: pwsh
        run: godot --editor --headless --path . --quit
      - name: Capture formal conformance and scheduling diagnostics
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path builds\diagnostics | Out-Null
          $scripts = @(
            'res://tests/v2_3/v2_3_social_sandbox_test.gd',
            'res://tests/v2_3/v2_3_social_sandbox_debug.gd'
          )
          $failed = $false
          foreach ($script in $scripts) {
            $safeName = [IO.Path]::GetFileNameWithoutExtension($script)
            $stdout = Join-Path $PWD "builds\diagnostics\$safeName.stdout.log"
            $stderr = Join-Path $PWD "builds\diagnostics\$safeName.stderr.log"
            $combined = Join-Path $PWD "builds\diagnostics\$safeName.log"
            $process = Start-Process `
              -FilePath (Get-Command godot).Source `
              -ArgumentList @('--headless', '--path', '.', '--script', $script) `
              -WorkingDirectory $PWD `
              -RedirectStandardOutput $stdout `
              -RedirectStandardError $stderr `
              -NoNewWindow `
              -Wait `
              -PassThru
            $parts = @()
            if (Test-Path $stdout) { $parts += Get-Content $stdout }
            if (Test-Path $stderr) { $parts += Get-Content $stderr }
            $parts | Set-Content -LiteralPath $combined -Encoding utf8
            Write-Host "===== $script ====="
            $parts | ForEach-Object { Write-Host $_ }
            if ($process.ExitCode -ne 0) { $failed = $true }
          }
          if ($failed) { exit 1 }
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Social-Sandbox-Diagnostics
          path: builds/diagnostics/*.log
          if-no-files-found: error
          retention-days: 7
