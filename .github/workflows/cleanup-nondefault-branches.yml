name: Cleanup nondefault branches

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete unnecessary branches
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const repository = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repository.data.default_branch;
            const branches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );
            const openPulls = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'open', per_page: 100 }
            );
            const openHeads = new Set(
              openPulls
                .filter((pull) => pull.head.repo && pull.head.repo.full_name === `${owner}/${repo}`)
                .map((pull) => pull.head.ref)
            );
            const deleted = [];
            const retained = [];
            for (const branch of branches) {
              if (branch.name === defaultBranch) {
                retained.push(`${branch.name} (default)`);
                continue;
              }
              if (branch.protected) {
                retained.push(`${branch.name} (protected)`);
                continue;
              }
              if (openHeads.has(branch.name)) {
                retained.push(`${branch.name} (open pull request)`);
                continue;
              }
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch.name}`,
              });
              deleted.push(branch.name);
            }
            await core.summary
              .addHeading('Nondefault branch cleanup')
              .addRaw(`Default branch: ${defaultBranch}\n\n`)
              .addHeading('Deleted', 2)
              .addList(deleted.length > 0 ? deleted : ['none'])
              .addHeading('Retained', 2)
              .addList(retained.length > 0 ? retained : ['none'])
              .write();
